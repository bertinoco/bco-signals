<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BCO Skills Tracker — Add Job</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #FAFAFA;
      color: #111111;
      padding: 16px;
      width: 400px;
      font-size: 14px;
    }
    .popup-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
      border-bottom: 1px solid #E0E0E0;
      padding-bottom: 12px;
    }
    .popup-header h1 { font-size: 16px; font-weight: 600; }
    .popup-header button { background: none; border: none; font-size: 18px; cursor: pointer; }
    .form-group {
      display: flex;
      flex-direction: column;
      margin-bottom: 12px;
    }
    label {
      font-weight: 500;
      margin-bottom: 4px;
      font-size: 12px;
      text-transform: uppercase;
      color: #555555;
      letter-spacing: 0.04em;
    }
    input, textarea, select {
      padding: 8px;
      border: 1px solid #E0E0E0;
      border-radius: 6px;
      font-family: inherit;
      font-size: 13px;
      line-height: 1.4;
    }
    input:focus, textarea:focus, select:focus {
      outline: none;
      border-color: #2A3FFF;
      box-shadow: 0 0 0 2px rgba(42, 63, 255, 0.1);
    }
    textarea {
      resize: vertical;
      min-height: 60px;
      font-family: monospace;
      font-size: 12px;
    }
    .required::after { content: " *"; color: #F2614A; }
    .form-actions {
      display: flex;
      gap: 8px;
      margin-top: 16px;
      padding-top: 12px;
      border-top: 1px solid #E0E0E0;
    }
    button.submit {
      flex: 1;
      padding: 10px 16px;
      background: #2A3FFF;
      color: #FAFAFA;
      border: none;
      border-radius: 6px;
      font-weight: 500;
      font-size: 13px;
      cursor: pointer;
      transition: background 0.2s;
    }
    button.submit:hover { background: #1A2FEF; }
    button.submit:disabled {
      background: #AAAAAA;
      cursor: not-allowed;
    }
    button.cancel {
      flex: 1;
      padding: 10px 16px;
      background: #F0F0F0;
      color: #555555;
      border: 1px solid #E0E0E0;
      border-radius: 6px;
      font-weight: 500;
      font-size: 13px;
      cursor: pointer;
    }
    button.cancel:hover { background: #E8E8E8; }
    .status {
      padding: 12px;
      border-radius: 6px;
      margin-bottom: 12px;
      display: none;
      font-size: 13px;
    }
    .status.success {
      background: #E8F5E9;
      color: #2E7D32;
      display: block;
    }
    .status.error {
      background: #FFEBEE;
      color: #C62828;
      display: block;
    }
    .status.loading {
      background: #E3F2FD;
      color: #1565C0;
      display: block;
    }
    .note {
      font-size: 12px;
      color: #888888;
      margin-top: 4px;
      line-height: 1.4;
    }
    .token-warning {
      padding: 8px;
      background: #FFF3E0;
      border-left: 3px solid #F57C00;
      border-radius: 4px;
      margin-bottom: 12px;
      font-size: 12px;
      color: #E65100;
    }
  </style>
</head>
<body>

<div class="popup-header">
  <h1>Add Job</h1>
  <button id="settings-btn" title="Settings">⚙️</button>
</div>

<div id="status" class="status"></div>

<div id="token-warning" class="token-warning" style="display: none;">
  GitHub token not set. Visit settings to add your token.
</div>

<form id="job-form">
  <div class="form-group">
    <label for="sourceUrl" class="required">Source URL</label>
    <input type="url" id="sourceUrl" name="sourceUrl" required placeholder="https://...">
    <div class="note">Current page URL will be used if empty</div>
  </div>

  <div class="form-group">
    <label for="company" class="required">Company</label>
    <input type="text" id="company" name="company" required placeholder="e.g., OpenAI">
  </div>

  <div class="form-group">
    <label for="title" class="required">Job Title</label>
    <input type="text" id="title" name="title" required placeholder="e.g., Senior Content Designer">
  </div>

  <div class="form-group">
    <label for="domain" class="required">Domain / Industry</label>
    <input type="text" id="domain" name="domain" required placeholder="e.g., AI / technology, Fintech">
  </div>

  <div class="form-group">
    <label for="location">Location</label>
    <input type="text" id="location" name="location" placeholder="e.g., NYC, Remote, EU">
  </div>

  <div class="form-group">
    <label for="postedDate">Posted Date</label>
    <input type="date" id="postedDate" name="postedDate">
    <div class="note">Approximate date from job posting</div>
  </div>

  <div class="form-group">
    <label for="notes">Notes / Context</label>
    <textarea id="notes" name="notes" placeholder="Why this role is interesting, relevant clusters/signals, etc."></textarea>
  </div>

  <div class="form-actions">
    <button type="button" class="cancel" id="cancel-btn">Close</button>
    <button type="submit" class="submit" id="submit-btn">Submit</button>
  </div>
</form>

<script src="popup.js"></script>

</body>
</html>
